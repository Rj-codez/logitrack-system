<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Package</title>

    <link rel="stylesheet" href="assets/css/forms.css">
    <link rel="stylesheet" href="assets/css/base.css">
</head>
<body>

<div class="container">

    <div class="form-box">

        <a href="02-dashboard.html" class="back-btn">
            ← Back to Dashboard
        </a>

        <h1>🗑️ Delete Package</h1>
        <p>Remove a package using tracking number</p>

        <div class="input-group">
            <label>Tracking Number</label>

            <input
                id="deleteTrackingNumber"
                type="text"
                placeholder="PKG1001">
        </div>

        <button id="deleteBtn" class="btn">
            Delete Package
        </button>

    </div>

</div>

<div id="deleteModal" class="modal-overlay">

    <div class="modal-box">

        <h2>Delete Package</h2>

        <p id="deleteModalText">
            Are you sure you want to delete this package?
        </p>

        <div class="modal-actions">
            <button id="cancelDeleteBtn" class="btn-secondary">
                Cancel
            </button>

            <button id="confirmDeleteBtn" class="btn-danger">
                Delete
            </button>
        </div>

    </div>

</div>
<div id="toast" class="toast"></div>
<script type="module" src="assets/js/app.js"></script>
</body>
</html>
