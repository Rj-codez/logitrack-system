<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | LogiTrack</title>
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/forms.css">
</head>

<body>

<div class="container">

    <div class="form-box">

        <div class="logo-box">
            <img src="assets/images/newlogo.png" alt="LogiTrack logo">
        </div>

        <h1>🔐 Admin Login</h1>
        <p>Enter credentials to access dashboard</p>

        <form id="loginForm">

            <div class="input-group">
                <label>Username</label>
                <input id="username" type="text" placeholder="Admin">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input id="password" type="password" placeholder="1234">
            </div>

            <button type="submit" class="btn">Login</button>

        </form>

        <div id="toast" class="toast"></div>

        <div id="loginFeedback" class="feedback hidden">
            <div id="feedbackIcon"></div>
            <p id="feedbackText"></p>
        </div>
    </div>

</div>

<script type="module" src="assets/js/app.js"></script>

</body>
</html>
